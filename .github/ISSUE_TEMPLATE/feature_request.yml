name: Feature request
description: Suggest an improvement
labels: [enhancement]
body:
  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: What are you trying to do with your agent? Lead with the problem, not the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
    validations:
      required: false
