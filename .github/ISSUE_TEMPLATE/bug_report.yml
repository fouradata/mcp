name: Bug report
description: Report a problem with @fouradata/mcp
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Package version
      description: Output of `npm view @fouradata/mcp version`, or your installed version.
      placeholder: "0.4.0"
    validations:
      required: true
  - type: dropdown
    id: client
    attributes:
      label: MCP client
      options:
        - Claude Desktop
        - Claude Code
        - Cursor
        - VS Code
        - Windsurf
        - Hosted (Streamable HTTP)
        - Other
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: What happened
      description: Steps to reproduce, the tool call you made, and the response or error. Redact your API key.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected instead
    validations:
      required: false
