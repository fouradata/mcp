name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
permissions:
  contents: read
jobs:
  node-floor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with: { node-version: '22.19.0', cache: 'npm' }
      - run: npm ci
        env:
          NPM_CONFIG_ENGINE_STRICT: 'true'
      - run: npm run test:ci
  build-test:
    needs: node-floor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - run: npm run test:ci
