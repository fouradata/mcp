services:
  foura-mcp:
    build:
      context: .
    container_name: foura-mcp
    ports:
      - "3076:3076"
    restart: unless-stopped
    # Match the non-root uid baked into the image.
    user: "1001:1001"
    environment:
      - NODE_ENV=production
      - PORT=3076
      - FOURA_API_BASE=${FOURA_API_BASE:-https://api.foura.ai/api}
      - FOURA_MCP_PAYLOADS_DIR=/data/payloads
      # Override these allowlists when exposing the server on another hostname.
      - FOURA_MCP_ALLOWED_HOSTS=${FOURA_MCP_ALLOWED_HOSTS:-mcp.foura.ai,localhost,127.0.0.1,[::1]}
      - FOURA_MCP_ALLOWED_ORIGINS=${FOURA_MCP_ALLOWED_ORIGINS:-https://mcp.foura.ai,https://claude.ai,https://app.cursor.sh,https://app.cursor.com}
    volumes:
      - foura-mcp-payloads:/data/payloads
    # Allow the process to complete its bounded graceful shutdown.
    stop_grace_period: 35s
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3076/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  foura-mcp-payloads:
